blocks:
  - type: hero
    title: TRG26
    intro: >-
      <video class="video-bg" preload playsinline autoplay muted loop
      src="/files/hero-loop.mp4"></video>

      <div class="logo">

      <time>Madrid. 22–24 octubre</time>

      <img src="/files/trgcon-veintiseis.png" alt="TRGCON Veintiseis">

      </div>

      <img src="/files/forma-1.png" alt="" class="forma-1">

      <img src="/files/forma-2.png" alt="" class="forma-2">
  - type: text
    id: intro
    theme: width-full
    columns: false
    text: >-
      La IA ha supuesto una revolución para la sociedad en general y el sector
      tecnológico en particular. En 2026, la TRG quiere ser el lugar donde
      separar la señal del ruido y aprender lo que realmente debemos hacer para
      seguir construyendo el futuro.
  - type: separator
    width: is-invisible
  - type: carouseltext
    title: ¿Qué te vas a <span>encontrar</span>?
    id: about
    theme: width-full
    carousel:
      - src: /files/TRG_aitor.jpg
      - src: /files/GcxSiPRWMAApJQJ.jpeg
      - src: /files/TRG_pulpo2.jpeg
      - src: /files/trg_alicandela.jpeg
      - src: /files/20251024_TRGCONx_006p.jpg
      - src: /files/1761645488656.jpeg
      - src: /files/20251024_TRGCONx_077p.jpg
      - src: /files/20251024_TRGCONx_136.jpg
      - src: /files/peques_pixelados2.jpg
      - src: /files/F9cIZM8WsAA_T8K.jpeg
    text: >-
      La TRG es **una conferencia sobre diseño, desarrollo y comercialización de
      servicios y productos digitales** que nace con el objetivo de punto de
      encuentro para «gente que hace cosas» alrededor del software, la
      innovación tecnológica e Internet: técnicos, diseñadores, gente de
      negocio, marketing u operaciones. Aquí nadie sobra. Todos son bienvenidos.


      Se organiza cuidando cada detalle —desde las acreditaciones hasta la
      gastronomía— para intentar transformar la asistencia en una experiencia y
      aportar el mayor valor posible a asistentes, ponentes y patrocinadores.


      En esta edición, el contenido pivotará alrededor de la Inteligencia
      Artificial, pero desde un punto de vista pragmático: experiencias reales
      que los asistentes puedan aplicar en su día a día.


      Todos nos preguntamos cómo afectará la IA a nuestro trabajo. La agenda de
      la TRG se ha diseñado para que encontremos respuestas.
  - type: vimeo
    code: '1180454644'
    cover: /files/thumb.jpg
    alt: Videoresumen de la anterior edición de la TRGCON
    id: video
  - type: calendar
    title: Agenda
    description: >-
      Tres días llenos de actividades, pero sobre todo, de oportunidades para
      conocer y ser conocido.
    id: agenda
    theme: is-light width-box box-fill
    days:
      - title: 'Jueves, 22 de octubre'
        events:
          - time: '15:00h'
            title: Apertura de puertas y acreditación de asistentes
            id: apertura-jueves
            description: >
              ¡Acredítate antes que nadie y evita las colas del viernes! Trae tu
              entrada, impresa o en el móvil, y **recoge tu awesómico welcome
              pack** antes de disfrutar de todas las actividades y contenido de
              la TRG26 ¡Bienvenidos!
            speakers: []
          - time: '15:30 - 17:30h'
            title: TALLERES de patrocinadores
            id: taller-sponsors
            subtitle: POR ANUNCIAR
            description: >-
              Talleres patrocinados por nuestros sponsors, que abren a los
              asistentes de la TRG que se hagan con una de las invitaciones
              ¡Hablad con ellos!


              Iremos desvelando los talleres en los próximos días. Puedes
              enterarte de las últimas novedades del evento siguiendo nuestra
              cuenta en [X](https://x.com/tarugoconf){target="_blank"} o
              [Instagram](https://www.instagram.com/tarugoconf/){target="_blank"}.
              Stay tuned Antunez !!!
            speakers: []
          - time: '15:30 - 18:00h'
            title: TALLERES organizados por la TRG
            id: talleres-trg
            subtitle: POR ANUNCIAR
            description: >-
              Los talleres de la TRG son formaciones prácticas de DOS HORAZAS Y
              MEDIA, impartidas por profesionales en activo y con muchos *tiros
              pegaos* en la materia impartida, que **te permitirán adquirir una
              nuevo habilidad que podrás emplear inmediatamente en tu día a
              día**.


              ¡Ojo! Los talleres no están incluidos en la entrada general de la
              TRG26. Puedes acceder a ellos con una entrada de tipo ***Killer
              Combo*** o adquiriendo el complemento ***Taller Práctico*** al
              comprar tu entrada.


              Iremos desvelando los talleres en los próximos días. Puedes
              enterarte de las últimas novedades del evento siguiendo nuestra
              cuenta en [X](https://x.com/tarugoconf){target="_blank"} o
              [Instagram](https://www.instagram.com/tarugoconf/){target="_blank"}.
              Stay tuned Antunez !!!
            speakers: []
          - time: '18:00 - 20:00h'
            title: Networking Tarugo
            id: networking-jueves
            subtitle: "Conoce a gente nueva \U0001F60A"
            description: >-
              Actividades opcionales y dinámicas divertidas, para que los
              asistentes se conozcan entre sí en un ambiente distendido y
              seguro, lideradas por voluntarios de la TRG.


              Si no conoces a nadie, saldrás con un grupo con el que compartir
              el resto de la conferencia y, si vienes acompañado, ampliarás el
              circulo con el que interactuarás durante el resto del evento.
            speakers: []
          - time: '20:00 - 22:00h'
            title: ¿Acabará la IA con mi puesto de trabajo?
            id: show-jueves
            subtitle: Podcast en directo
            description: >-
              ***** y ***** son el ying y el yang de *****, **uno de los podcast
              más didácticos, rigurosos y —sobre todo— divertidos sobre 
              Inteligencia Artificial** que puedes escuchar en castellano. En la
              TRG26 grabarán un programa en directo en el que interactuarán
              constantemente con el público.


              La IA ha puesto patas arriba el mercado laboral de «cuello blanco»
              en general y el sector técnico en particular.


              Algunas empresas han escuchado los *cantos de sirena* de muchos
              gurús y se han desprendido de parte de su plantilla o congelado
              sus contrataciones. Otras, directamente han usado la IA como
              excusa para hacer una limpia que satisfaga a accionistas e
              inversores.


              Pero ¿cuánto hay de realidad y cuánto de pensamiento mágico detrás
              de todas estas decisiones empresariales?


              En dos horas separaremos la señal del ruido para **dibujar un mapa
              que nos indique hacia dónde va el mercado laboral y qué debemos
              hacer para anticiparnos** y no perdernos por el cámino.


              El público podrá interactuar e intervenir en un *chou* único lleno
              de sorpresas para los asistentes.
            speakers: []
      - title: 'Viernes, 23 de octubre'
        events:
          - time: '9:00h'
            title: Apertura de puerta y acreditación de asistentes
            id: apertura-viernes
            description: >-
              ¡Acredítate antes que nadie y evita las colas! Trae tu entrada,
              impresa o en el móvil, y disfruta de todas las actividades y
              contenido de la TRG26.


              Te recibiremos con **café, bica gallega y fruta**... además de
              amenizar la espera con la música de nuestro DJ Residente.


              ¡Bienvenidos!
            speakers: []
          - time: '10:00 - 10:15h'
            title: Corrupción en m-IA-mi
            id: keynote
            subtitle: Keynote
            description: >-
              En la apertura de la TRG puede pasar cualquier cosa, desde que
              alguien salga vestido de comandante de la Fuerza Aerea Gallega
              hasta que aparezca Steve Jobs. Te podrá gustar más o menos, pero
              no te dejará indiferente.


              Lo único que te pedimos es que acudas con la mente abierta y que
              seas puntual. A las 10:00h cerraremos las puertas del auditorio,
              que quedaran selladas hasta las 10:15. Lo que pasa en la TRG se
              queda en la TRG...


              Además, en esta keynote te daremos toda la información para que
              puedas disfrutar al 100% del evento.
            speakers:
              - david-bonilla
          - time: '10:15 - 11:00h'
            title: CHARLA AWESÓMICA
            id: charla-tba1
            subtitle: POR ANUNCIAR
            description: >-
              «*Ningún discurso es demasiado corto*». En la TRG creemos en las
              enseñanzas de los legendarios Kenneth Roman y Joel Raphaelson, por
              eso nuestras charlas «sólo» duran 30 minutos. Eso sí, tenemos un
              turno de preguntas de 15 minutos —desarrollado en formato
              entrevista, sentado en un sofá, como en un *late night show*— que
              SIEMPRE se nos queda corto. ¡La interactuación con el público
              suele ser tan interesante como la charla en sí!


              La TRG se diferencia de otras conferencias en que tiene **línea
              editorial**. Elegimos los temas que creemos que más pueden
              interesar al público y, después, buscamos a los ponentes que
              creemos que mejor pueden desarrollarlos. 


              Si quieres ver cómo es una charla típica de la TRG, tienes muchas
              disponibles en nuestro canal de Vimeo. Por ejemplo, la que dio
              Antonio en 2023, explicando [cómo una fábrica de polvorones se
              había convertido en una empresa puntera de
              I+D](https://vimeo.com/894460019/2c5c69323d){target="_blank"}.


              Iremos desvelando las charlas en los próximos días. Puedes
              enterarte de las últimas novedades del evento siguiendo nuestra
              cuenta en [X](https://x.com/tarugoconf){target="_blank"} o
              [Instagram](https://www.instagram.com/tarugoconf/){target="_blank"}.
              ***Stay tuned Antunez !!!***
            speakers:
              - trudy
          - time: '11:00 - 11:45h'
            title: Quemar tokens sin quemar tu empresa
            id: charla-cristian
            subtitle: por Cristian Córdova
            description: >-
              Los modelos comerciales de IA son comodísimos. Hasta que dejan de
              serlo.


              Cuotas, costes impredecibles, límites de uso, privacidad,
              cumplimiento legal, latencia... o la necesidad de que nuestra
              plantilla y nuestras aplicaciones pueda usar IA sin mirar el
              contador de tokens cada cinco minutos. Tarde o temprano, muchas
              empresas se hacen la misma pregunta: **¿tiene sentido montar
              nuestra propia infraestructura de IA?**


              En esta charla, Cristian Córdova te explicará cuándo merece la
              pena desplegar y gestionar un LLM propio, qué tipo de empresas
              pueden beneficiarse más de ello y cuáles deberían pensárselo dos
              veces antes de comprar una GPU.


              Hablaremos de modelos abiertos, servidores de inferencia,
              hardware, costes reales, operación, seguridad, aspectos legales,
              convivencia con modelos comerciales y todas esas decisiones que no
              aparecen en los tutoriales, pero que determinarán si tu «ChatGPT
              privado» acaba siendo una ventaja competitiva… o una estufa
              carísima con API compatible con OpenAI.
            speakers:
              - cristian
          - time: '11:45 - 12:00h'
            title: ¡Atrápalos a todos!
            subtitle: Demo del juego de cartas tipo Pokemon de la TRG26
            description: >-
              Como en cada edición, cada asistente se llevará a casa
              COMPLETAMENTE GRATIS un juego de mesa original que disfrutar con
              amigos y familia.


              En este ocasión, tendremos una versión de uno de los juegos de
              cartas más populares —Pokemon— que nos permitirá aprender a jugar
              al mismo y conocer el enorme ecosistema alrededor.
            speakers: []
          - time: '12:00 - 12:45h'
            title: ☕ Coffe Break
            description: >-
              Café, snacks y pastitas para llenar las tripitas.


              Este intermedio estará amenizado por el DJ residente de la TRG que
              pinchará los mejores mixes de la bandaza sonora de Miami Vice.
            speakers: []
          - time: '12:45 - 13:00h'
            title: ¡El precio Justo!
            description: >-
              Un concursote de Lanzarote en el que los asistentes de la TRG
              podrán demostrar sus conocimientos sobre el *bisnes* de la
              Informática y ganar suculentos premios.
            speakers: []
          - time: '13:00 - 13:45h'
            title: 'Matar al SaaS es fácil, lo difícil viene después'
            id: charla-joseramon
            subtitle: por Jose Ramón Pérez
            description: >-
              La IA ha acelerado un proceso de *deSaaSificación*, desdibujando
              la fina línea que separa la compra de software del desarrollo
              propio.


              Constantemente nos llegan cantos de sirena que afirman que **el
              SaaS ha muerto**. La realidad, como casi siempre, es bastante
              menos sexy, pero mucho más interesante.


              En esta charla, José Ramón nos contará qué ocurre el día después
              de sustituir una herramienta comercial —clave para el
              funcionamiento de una plataforma online que factura más de 1.000
              millones de euros— por una solución propia.


              Aprenderemos cómo decidir qué merece la pena internalizar, cómo
              calcular el coste real más allá del desarrollo inicial, cómo
              organizar el mantenimiento para evitar que la solución se quede
              atrás y cómo compararnos de forma honesta con las alternativas que
              ofrece el mercado.
            speakers:
              - joseramon
          - time: '13:45 - 14:30h'
            title: CHARLA AMBELIBOBOL
            id: charla-tba2
            subtitle: POR ANUNCIAR
            description: >-
              En esta franja horaria disfrutarás de una charla awesómica y
