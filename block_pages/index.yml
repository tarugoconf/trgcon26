              **El objetivo es que adquieras un nuevo superpoder que puedas
              aplicar en tu día a día** —el lunes siguiente, si quieres— que te
              ayude a progresar personal y profesionalmente.


              Si quieres enterarte del contenido y speaker en cuanto lo
