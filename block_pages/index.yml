      - title: 'Sábado, 24 de octubre'
        events:
          - time: '11:00 - 17:00h'
            title: "\U0001F389 Community Day"
            id: community-day
            label: IMPORTANTE
            description: >+
              Después de la intensidad del viernes, el sábado 24 de octubre —de
              11:00h a 17:00h— celebramos el «Día de la Comunidad», una jornada
              diseñada para disfrutar relajadamente y a la que podrás traer a tu
              familia, amigos y compañeros de trabajo.


              **Habrá actividades para todas las edades... y todo tipo de
              relación con la tecnología**. En el Community Day disfrutarán por
              igual grandes, pequeños, hackers de nivel 32 o gente que no ha
              tocado un ordenador en su vida.


              En muy poco tiempo os detallaremos toda la agenda del día, pero
              para que os hagáis una idea de lo que podéis encontrar, podéis
              consultar [la del año
              pasado](https://2025.trgcon.com/community-day/){target="_blank"}.

            speakers: []
  - type: speakers
    title: Speakers
    description: >
      El «speaker» o ponente de la Tarugoconf no nace, **[SE
      HACE](https://github.com/tarugoconf/trgcon26/blob/main/SPEAKERS.md){target=_blank}**.
      Estos

      son los awesómicos invitados con los que contaremos este año:
    id: speakers
    theme: width-full
    speakers:
      - name: José Ramón Pérez
        id: joseramon
        company: Mercadona Tech
        role: CPO/CTO
        bio: >-
          Jose Ramón es CPO y CTO de Mercadona Tech, donde lidera la estrategia
          de producto e ingeniería de toda la vertical online de Mercadona.


          Antes, trabajó en roles de producto y tecnología en empresas como
          Amazon, JobandTalent o Tuenti.


          Es Doctor en Ciencias de la Computación por la Universidad Complutense
          de Madrid, en la especialidad de Ingeniería del Software e
          Inteligencia Artificial. Comparte lo que aprende en
          [Gemba](https://www.gemba.es/){target=_blank}, su newsletter semanal
          sobre producto, ingeniería y liderazgo técnico.
        image: /files/people/joseramon.jpg
        links:
          - icon: linkedin-logo
            url: 'https://www.linkedin.com/in/joseaguera/'
          - icon: spotify-logo
            url: 'https://open.spotify.com/show/2zTAR5x2wWtvdB8JXjy0cm'
