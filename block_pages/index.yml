extra_head: |-
  <style>
    @scope(.block-hero) {
      :scope {
        background: linear-gradient(var(--color-secondary), var(--color-primary)), url("/files/miami-fondo.jpg");
        background-blend-mode: multiply;
        background-repeat: no-repeat;
        background-size: cover;
      }

      h1 {
        display: none;
      }
      .logo {
        display: grid;
        justify-content: center;
        justify-items: center;
        row-gap: 10px;
        width: fit-content;
        margin: auto;
        padding: 20px 10px;
      }
      .logo::after {
        width: 100%;
        display: block;
        content: "";
        grid-column: 1;
        grid-row: 1 / 3;
      }
      time {
        text-transform: uppercase;
        grid-row: 1;
        grid-column: 1;
        font-size: clamp(1rem, 1vw, 2rem);
        font-weight: bold;
        letter-spacing: 0.3em;
      }
      strong {
        align-self: center;
        grid-row: 1 / 3;
        z-index: 1;
        grid-column: 1;
        color: var(--color-secondary);
        font-family: script;
        font-size: clamp(5rem, 7vw, 8rem);
        transform: rotate(-5deg);
        text-shadow: 
          0 5px 0 var(--color-dark),
          0 10px 0 var(--color-primary-light),
          0 15px 10px var(--color-primary);
      }
      svg {
        width: clamp(200px, 20vw, 600px);
        height: auto;
        grid-row: 2;
        grid-column: 1;
        mask-repeat: no-repeat;
        mask-image: linear-gradient(
          black 25%, transparent 25.1%, transparent 25.5%, black 25.6%,
          black 28%, transparent 28.1%, transparent 28.5%, black 28.6%, 
          black 31%, transparent 31.1%, transparent 31.5%, black 31.6%, 
          black 34%, transparent 34.1%, transparent 35%, black 35.1%, 
          black 37%, transparent 37.1%, transparent 38%, black 38.1%, 
          black 41%, transparent 41.1%, transparent 42%, black 42.1%, 
          black 46%, transparent 46.1%, transparent 47.5%, black 47.6%, 
          black 51%, transparent 51.1%, transparent 52.5%, black 52.6%,
          black 57%, transparent 57.1%, transparent 59%, black 59.1%,
          black 64%, transparent 64.1%, transparent 66%, black 66.1%,
          black 71%, transparent 71.1%, transparent 73%, black 73.1%,
          black 78%, transparent 78.1%, transparent 81%, black 81.1%,
          black 86%, transparent 86.1%, transparent 89%, black 89.1%,
          black 94%, transparent 94.1%, transparent 98%, black 98.1%,
          black 100%
        );
      }
  </style>
