blocks:
  - type: hero
    title: TRGCON 26
    intro: |-
      <div class="logo">
      <time>Madrid. 22–24 octubre</time>
      <img src="/files/trgcon-veintiseis.png" alt="TRGCON Veintiseis">
      </div>
  - type: text
    id: intro
    theme: width-full
    columns: false
    text: >-
      Mínima intro del evento y de la décima edición en 2 o tres líneas. Lorem
      ipsum dolor sit amet, consectetur adipiscing elit. Vestibulum dignissim
      lacus ipsum, eget consequat neque consequat quis.
  - type: separator
    width: is-invisible
  - type: carouseltext
    title: ¿Qué te vas a encontrar?
    id: about
    theme: width-full
    carousel:
      - src: /files/miami-fondo.jpg
      - src: /files/hero.jpg
    text: >-
      La TRG es una conferencia sobre diseño, desarrollo y comercialización de
      servicios digitales que nace alrededor de la hiperactiva Comunidad de
      suscriptores de La Bonilista, una newsletter semanal sobre emprendimiento
      tecnológico escrita por David Bonilla.


      Es ante todo, un punto de encuentro para gente que «hace cosas» alrededor
      del software, la innovación tecnológica e Internet: desarrolladores,
      diseñadores, inversores, comerciales, gente de marketing o soporte,
      administradores de sistemas o recruiters. Aquí nadie sobra. Todos son
      bienvenidos.


      Se organiza cuidando cada detalle de forma enfermiza —desde las
      acreditaciones hasta la oferta gastronómica— para intentar transformar la
      asistencia en una experiencia y aportar el mayor valor posible a
      asistentes, ponentes y patrocinadores.
  - type: vimeo
    code: '1180454644'
    cover: /files/thumb.jpg
    alt: Videoresumen de la anterior edición de la TRGCON
    id: video
  - type: logos
    title: Partners
    id: partners
    theme: width-full
    description: >-
      Estas son las compañías que hacen que todo esto sea posible. Cada una de
      estas empresas ha decidido apoyarnos para que la TRG pueda contar con una
      mínima seguridad económica y así podamos centrarnos en ofrecer a la
      Comunidad la calidad y el espíritu de siempre. Si quieres ser parte de
      este esfuerzo, en esta o en la edición de 2024, [consulta nuestras
      *awesómicas* oportunidades de
      patrocinio](https://www.dropbox.com/scl/fi/06f7fbh2eqep3bab0vnxh/TRG24_sponsorship_deck_ES.pdf?rlkey=cz12k1c7wyxins6jv71qfjeyk&dl=0){target=_blank}
      ¡graciñas!



      [![Image](files/logos/wordpresscom_white.png){width=600}](https://wordpress.com/es/ppc/creador-de-paginas-web-wordpress/?utm_medium=referral&utm_source=TRG2025&utm_campaign=eventhomepage){target=_blank}


      Crea, publica, y despega.
    size: medium
    items:
      - alt: Logo
        img: /files/logos/logo.png
        url: 'https://github.com/tarugoconf/TOP'
      - alt: Logo
        img: /files/logos/logo.png
        url: 'https://github.com/tarugoconf/TOP'
      - alt: Logo
        img: /files/logos/logo.png
        url: 'https://github.com/tarugoconf/TOP'
  - type: separator
    width: is-invisible
  - type: logos
    theme: width-full
    size: small
    items:
      - alt: Logo
        img: /files/logos/logo.png
        url: 'https://github.com/tarugoconf/TOP'
      - alt: Logo
        img: /files/logos/logo.png
        url: 'https://github.com/tarugoconf/TOP'
      - alt: Logo
        img: /files/logos/logo.png
        url: 'https://github.com/tarugoconf/TOP'
  - type: separator
    width: is-default
  - type: people
    title: Mecenas
    id: mecenas
    description: >-
      Estas personas han contribuido con su mecenazgo han hecho posible una
      #TRGx MEJOR para todos los asistentes.


      Si quieres convertirte en mecenas, participar en «el Senado» de la TRG y
      formar parte de la toma de decisiones del evento, puedes [adquirir tu
      entrada](/entradas) directamente o ponerte en [contacto](#contacto) con
      nosotros. 
    theme: width-full
    items:
      - name: Person
        img: /files/people/avatar.webp
      - name: Person
        img: /files/people/avatar.webp
      - name: Person
        img: /files/people/avatar.webp
      - name: Person
        img: /files/people/avatar.webp
      - name: Person
        img: /files/people/avatar.webp
      - name: Person
        img: /files/people/avatar.webp
  - type: separator
    width: is-default
  - type: pdf
    title: Cómo Patrocinar
    id: patrocinar
    theme: width-full
    text: >-
      En la TRG intentamos huir de la figura del «sponsor» habitual y
      consideramos a nuestros patrocinadores verdaderos socios. Nos preocupamos
      por entender sus objetivos y personalizamos los paquetes de patrocinio
      para intentar alcanzarlos, trabajando mano a mano con ellos y creando
      relaciones que perduran a lo largo de los años.


      - Más de **1.000** asistentes a lo largo de los 3 días

      - **2** días trending topic nacional

      - **25** millones de impresiones en redes sociales


      Si quieres que tu empresa sea parte de la próxima #trgX puedes mandarnos
      un mail a [tarugoconf@bonillaware.com](mailto:tarugoconf@bonillaware.com)
      ¡Nos encantará charlar contigo!
    src: /files/trg25_sponsors_deck_es.pdf
    caption: >
      [Descarga el dosier del
      patrocinio](/files/trg25_sponsors_deck_es.pdf){target=_blank .button}


      [Versión en inglés](/files/trg25_sponsors_deck_en.pdf){target=_blank}
  - type: faq
    title: Preguntas frecuentes
    id: faq
    theme: is-light width-box box-fill
    questions:
      - question: ¿A quién está dirigido este evento? ¿Es para mi?
        answer: >
          Intentamos que la TRG sea un punto de encuentro para gente que hace
          cosas (o que tiene ganas de hacerlas) en el sector digital. Nos
          desvivimos para que te sientas como en casa, tanto si tienes un perfil
          tecnológico como si trabajas en otras disciplinas.
      - question: >-
          Soy suscriptor/a de La Bonilista ¿tengo algún tipo de ventaja o
          descuento?
        answer: >
          Pues sí. Los suscriptores de [La
          Bonilista](https://www.bonilista.com/){target=_blank} pudistéis
          **acceder a las entradas *early bird*, de precio reducido, un día
          antes que el público general**. Se agotaron en 24 horas, así que, os
          quedásteis con la mayoría :)
      - question: "¿Qué es eso del Community Day del sábado? \U0001F389"
        answer: >
          Una jornada abierta, a la que podréis traer a familia, compañeros y/o
          amigos, con un montón de actividades para grandes y pequeños.


          Tenéis toda la info actualizada en [esta página](/community-day).
      - question: ¿Ofrecéis ayuda para gestionar viajes y/o hoteles?
        answer: >
          Sí, gracias a nuestro partnership con Vyootrip, podéis reservar
          vuestro viaje y estancia con interesantes descuentos. Tenéis más info
          en [esta página](https://www.vyootrip.com/trgcon/){target=_blank}.
      - question: ¿Cómo puedo estar al día de todas las noticias y novedades del evento?
        answer: >
          Tenemos un [Blog](https://tarugoconf.com/blog){target=_blank} donde
          iremos colgando toda la información relevante,

          pero no dejes de seguir [la cuenta en Twitter de la
          TRG](https://twitter.com/tarugoconf){target=_blank} y,

          especialmente, el hashtag
          [#trgX](https://twitter.com/search?q=%23trgX&src=typed_query&f=live){target=_blank}.
      - question: "¿Cuándo se podrán comprar entradas? \U0001F39F️"
        answer: >
          Solemos sacar las entradas a la venta en junio.


          Avisamos con bastante antelación del día que se ponen a la venta. Los
          suscriptores de [La
          Bonilista](https://www.bonilista.com/){target=_blank}, eso sí, pueden
          **acceder a las entradas *early bird* —de precio reducido— un día
          antes que el público general**.
      - question: Si mi empresa me paga la entrada ¿Hacéis factura?
        answer: >
          Por supuesto. En la TRG, lo único negro es el futuro de David Bonilla
          como cantante.
      - question: ¿Tenéis Código de Conducta?
        answer: >
          Por supuesto que tenemos [Código de
          Conducta](https://2024.trgcon.com/codigo-de-conducta/){target=_blank}.
      - question: Sigo teniendo dudas ¿qué hago?
        answer: >
          No problemo. Visita la sección de [Contacto](/#contacto) de esta misma
          web

          donde encontrarás la información necesaria para contactar con nosotros
          por múltiples canales.

          </br></br>

          ¡Estaremos encantados de resolverte cualquier duda!
  - type: contact
    title: Contacto
    id: contacto
    theme: width-full
    items:
