extra_head: |-
  <style>
    @scope(.block-hero-header) {
      :scope {
        _background: white;
      }

      h1 {
        display: none;
      }
      .logo {
        display: grid;
        justify-content: center;
        justify-items: center;
        row-gap: 10px;
      }
      .logo::after {
        width: 100%;
        display: block;
        content: "";
        --color: var(--color-primary);
        background: linear-gradient(
          transparent 25%, var(--color) 25.1%, var(--color) 25.5%, transparent 25.6%,
          transparent 28%, var(--color) 28.1%, var(--color) 28.5%, transparent 28.6%, 
          transparent 31%, var(--color) 31.1%, var(--color) 31.5%, transparent 31.6%, 
          transparent 34%, var(--color) 34.1%, var(--color) 35%, transparent 35.1%, 
          transparent 37%, var(--color) 37.1%, var(--color) 38%, transparent 38.1%, 
          transparent 41%, var(--color) 41.1%, var(--color) 42%, transparent 42.1%, 
          transparent 46%, var(--color) 46.1%, var(--color) 47.5%, transparent 47.6%, 
          transparent 51%, var(--color) 51.1%, var(--color) 52.5%, transparent 52.6%,
          transparent 57%, var(--color) 57.1%, var(--color) 59%, transparent 59.1%,
          transparent 64%, var(--color) 64.1%, var(--color) 66%, transparent 66.1%,
          transparent 71%, var(--color) 71.1%, var(--color) 73%, transparent 73.1%,
          transparent 78%, var(--color) 78.1%, var(--color) 81%, transparent 81.1%,
          transparent 86%, var(--color) 86.1%, var(--color) 89%, transparent 89.1%,
          transparent 94%, var(--color) 94.1%, var(--color) 98%, transparent 98.1%,
          transparent 100%
        );
        grid-column: 1;
        grid-row: 1 / 3;
      }
      time {
        text-transform: uppercase;
        grid-row: 1;
        grid-column: 1;
        font-size: clamp(1rem, 1vw, 2rem);
        font-weight: bold;
        letter-spacing: 0.3em;
      }
      strong {
        align-self: center;
        grid-row: 1 / 3;
        z-index: 1;
        grid-column: 1;
        color: var(--color-secondary);
        font-family: script;
        font-size: clamp(5rem, 7vw, 8rem);
        text-shadow: 
          0 5px 0 var(--color-dark),
          0 10px 0 var(--color-primary-light),
          0 15px 10px var(--color-primary);
      }
      svg {
        width: clamp(200px, 20vw, 600px);
        height: auto;
        grid-row: 2;
        grid-column: 1;
      }
  </style>
