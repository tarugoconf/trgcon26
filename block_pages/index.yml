    description: >-
      Tres días llenos de actividades, pero sobre todo, de oportunidades para
      conocer y ser conocido.
    id: agenda
    theme: is-light width-box box-fill
    days:
      - title: 'Jueves, 23 de octubre'
        events:
          - time: '15:00h'
            title: Apertura de puertas y acreditación de asistentes
            id: apertura-jueves
            description: >
              ¡Acredítate antes que nadie y evita las colas del viernes! Trae tu
              entrada, impresa o en el móvil, y recoge tu awesómico welcome pack
              antes de disfrutar de todas las actividades y contenido de la TRG
              ¡Bienvenidos!
            speakers: []
          - time: '15:30 - 18:00h'
            title: TALLERES de patrocinadores
            id: taller-sponsors
            subtitle: SNGULAR
            description: >-
              Talleres patrocinados por nuestros sponsors, que abren a los
              asistentes de la TRG que se hagan con una de las invitaciones
              ¡Hablad con ellos!


              * SNGULAR (con su división Tecnofor) dará un taller de «Vibe
              Coding».
            speakers: []
          - time: '15:30 - 18:00h'
            title: >-
              TALLER: Herramientas y procesos para equipos de desarrollo de alto
              rendimiento
            id: taller-recena
            subtitle: por Manuel Recena
            description: "Este taller lleva TRES AÑOS CONSECUTIVOS PETÁNDOLO, así que, le hemos pedido a Manuel Recena repetirlo de nuevo... aunque el solo  quiera venir como voluntario **¿conseguiremos convencerlo entre todos? \U0001F62C**\n\nConoceremos las herramientas y procesos necesarios para **conseguir que nuestro ciclo de desarrollo de software sea lo más productivo posible**.\n\nDesde definir OKRs que nos ayuden a medir nuestro progreso hasta establecer el flujo de trabajo necesario para **conseguir que el despliegue en producción de nuestro software sea tan frecuente como ABURRIDO** —porque nunca pase nada— pasando por los radiadores de información necesarios para que todo el mundo sepa lo que está pasando en cada momento.\n\nDa igual si tu equipo de desarrollo es mejor o peor, de este taller te llevarás un montón de ideas y buenas prácticas para que sea MEJOR."
            speakers:
              - recena
          - time: '15:30 - 18:00h'
            title: >-
              TALLER: Revoluciona tus formaciones. De «cursos» a experiencias de
              aprendizaje
            id: taller-maria
            subtitle: por María Berenguer
            description: >-
              ¿Quieres crear formaciones memorables y que las personas conecten
              y aprendan de forma activa?


              Basado en neurociencia cognitiva, la **metodología Training from
              the BACK of the Room!** propone dejar de centrar la formación en
              quien la imparte y ponerla en manos de quienes aprenden: activar
              su mente, hacerles practicar y aplicar para lograr un aprendizaje
              profundo y duradero.


              En este taller María te guiará a través del formato de diseño de
              las 4C (Conexiones, Conceptos, Práctica Concreta y Conclusiones)
              para **que empieces a crear desde cero las mejores formaciones o
              mejores los que ya tengas**. Trabajarás con otras personas,
              compartirás ideas y aprenderás herramientas que podrás aplicar de
              inmediato.


              ¿Qué te llevarás?

              * Un primer borrador de tu formación (curso, taller, webinar,
              workshop…), listo para seguir desarrollando tras el taller.

              * Una primera aproximación a TBR, entendiendo cómo puede ayudarte
              a diseñar sesiones más participativas y efectivas.


              No necesitas experiencia previa en TBR; este taller está pensado
              tanto para quienes llevan años formando como para quienes empiezan
              ahora. Solo necesitas traer una idea de la formación que quieras
              diseñar… ¡y muchas ganas de experimentar!
            speakers:
              - recena
          - time: '15:30 - 18:00h'
            title: 'TALLER: De técnicos a Tech Leads'
            id: taller-felix
            subtitle: por Félix López
            description: >-
              En este taller se diseccionará el rol de Tech Lead y **los
              asistentes aprenderán no solo las responsabilidades habituales del
              mismo, sino también las métricas, herramientas, documentación y
              procesos que les ayudarán a alcanzarlas**.


              Pero un taller debe ser práctico, por eso Félix os planteará
              algunas de las situaciones y experiencias más complejas que podrás
              encontrar como líder técnico, y así experimentar cómo se puede
              aplicar todo lo aprendido para llevar a tu equipo al próximo
              nivel.
            speakers:
              - felix
          - time: '18:00 - 20:00h'
            title: Networking Tarugo
            id: networking-jueves
            subtitle: "Conoce a gente nueva \U0001F60A"
            description: >-
              Actividades y dinámicas divertidas para que los asistentes se
              conozcan entre sí en un ambiente distendido y seguro.


              Si no conoces a nadie, saldrás con un grupo con el que compartir
              el resto de la conferencia y, si vienes acompañado, ampliarás el
              circulo con el que interactuarás durante el resto del evento.
            speakers: []
          - time: '20:00 - 22:00h'
            title: 10 años en coma en el sector de la tecnología
            id: show-jueves
            subtitle: por Codely
            description: >-
              ¿Os imaginaís como se sentiría un programador que hubiera tenido
              un accidente de tráfico en 2015, **se hubiera quedado en coma y
              despertara hoy después de 10 años**?


              Eso es lo que nos proponen Rafa y Javi, los dos miembros de
              [Codely](https://codely.com/){target="_blank"}, que han demostrado
              a lo largo de los años que se puede hablar de tecnología —y hasta
              enseñarla— de forma amena y divertida. 


              El público podrá interactuar con los presentadores e intervenir en
              un show único lleno de sorpresas para los asistentes.
            speakers: []
      - title: 'Viernes, 24 de octubre'
        events:
          - time: '9:00h'
            title: Apertura de puerta y acreditación de asistentes
            id: apertura-viernes
            description: >-
              ¡Acredítate antes que nadie y evita las colas! Trae tu entrada,
              impresa o en el móvil, y disfruta de todas las actividades y
              contenido de la TRG.


              Te recibiremos con **café, bica gallega y fruta**... además de
              amenizar la espera con la música [Don
              Robot](https://www.youtube.com/watch?v=ltXX9Ab6vuo){target="_blank"},
              nuestro DJ Residente.


              ¡Bienvenidos!
            speakers: []
          - time: '10:00 - 10:15h'
            title: TRON
            id: keynote
            subtitle: Keynote
            description: >-
              En la apertura de la TRG puede pasar cualquier cosa, desde que
              alguien salga vestido de comandante de la Fuerza Aerea Gallega
              hasta que aparezca Steve Jobs. Te podrá gustar más o menos, pero
              no te dejará indiferente.


              En esta keynote, David nos dará toda la información para disfrutar
              del evento.
            speakers:
              - david-bonilla
          - time: '10:15 - 11:00h'
            title: Hackeando Silicon Valley
            id: charla-aitor
            subtitle: por Aitor Guevara
            description: >-
              Silicon Valley, El Valle, «The Bay Area»... la zona que se ha
              erigido en epicentro mundial de la innovación y el negocio
              tecnológicos, hasta el punto de <strong>instalarse en el
              imaginario popular como el sitio donde hay que estar para pintar
              algo en la industria</strong>.


              ¿Pero es Silicon Valley un lugar o, más bien, una idea exportable
              al resto del mundo?


              En esta charla, Aitor compartirá <strong>su experiencia creando
              equipo aquí para importantes empresas de allá</strong>, logrando
              influir e incluso liderar de manera definitiva parte de la
              estrategia tecnológica de las mismas sin moverse de Barcelona.


              Si te preguntas <strong>cómo tener impacto en un «unicornio»
              tecnológico desde dentro sin renunciar a la tortilla de
              patatas</strong>, esta es tu charla.
            speakers:
              - aitor
          - time: '11:00 - 11:45h'
            title: Cómo montar tu propio banco online
            id: charla-paloma
            subtitle: por Paloma Barreiro
            description: >-
              Si el eslogan de la TRG es «TODO ES POSIBLE» entonces ¿por qué no
              puede serlo montar nuestro propio banco?


              En esta charla, Paloma nos contará cómo se concibió la idea de
              B100 —un neobanco que te recompensa económicamente por estar en
              forma— y todos los retos regulatorios, organizativos y técnicos
              que han tenido que superar para convertirlo en una realidad.


              El «libro de instrucciones» que ella no tuvo, por si te da por
              montar el tuyo :)
            speakers:
              - paloma
          - time: '11:45 - 12:00h'
            title: Unicornio 3.0
            subtitle: Demo del juego de cartas tipo Magic de la TRGx
            description: >-
              Como en cada edición, cada asistente se llevará a casa un juego de
              mesa original que disfrutar con amigos y familia.


              En este ocasión, tendremos la nueva edición de uno de nuestros
              juegos más populares ¡Unicornio! Un juego tipo Magic, pero con
              algunas de las personalidades y startups más relevantes del sector
              como protagonistas.
            speakers: []
          - time: '12:00 - 12:45h'
            title: ☕ Coffe Break
            description: >-
              Café, snacks y pastitas para llenar las tripitas.


              Este intermedio estará amenizado por el DJ residente de la TRG
              —**Don Robot**- que pinchará los mejores temas de Daft Punk,
              incluyendo la bandaza sonora que se marcaron para la película
              «Tron: Legacy»
            speakers: []
          - time: '12:45 - 13:00h'
            title: ¡El precio Justo!
            description: >-
              Un concursote de Lanzarote en el que los asistentes de la TRG
              podrán demostrar sus conocimientos sobre el bisnes de la
              Informática y ¡ganar suculentos premios!
            speakers: []
          - time: '13:00 - 13:45h'
            title: 'Prompts Wars: IA en la linea de comandos'
            id: charla-oyabun
            subtitle: por Javier Alonso
            description: >-
              Cuando oímos hablar de «diseño de producto» los técnicos solemos
              pensar en botoncitos y colores brillantes, sin embargo, el Product
              Design va mucho más allá de eso.


              Por ejemplo, diseñar **la experiencia de uso de esos propios
              técnicos cuando usan una herramienta cuya interfaz es una simple
              línea de comandos**.


              Sí, hay diseño de producto en la línea de comandos y —como todas
              las facetas de la Informática— la IA también ha llegado hasta
              aquí.


              En esta charla, Javi nos contará cómo se está enfrentado Docker al
              desafío que es integrar la IA en herramientas de desarrollo y nos
              enseñará a aplicar esas lecciones aprendidas en nuestros propios
              productos.
            speakers:
              - oyabun
          - time: '13:45 - 14:30'
            title: Todos soñamos alguna vez con programar un videojuego
            id: charla-javier
            subtitle: por Javier «Jare» Arévalo
            description: >-
              ¿Quién no ha querido alguna vez hacer un videojuego? Sin embargo,
              a la mayoría nuestra carrera nos ha llevado por otros derroteros.


              En esta charla, conocerás las tecnologías, metodologías, buenas
              prácticas y herramientas a aprender para desarrollar un juego —si
              te animas a dar el salto, aunque sea como *side project*— con las
              máximas garantías de éxito, de la mano de alguien que recorrió el
              camino contrario.


              Y, de paso, **aprenderás las peculiaridades y diferencias entre el
              desarrollo de software corporativo y videojuegos**. Dos mundos
              aparentemente alejados, pero que pueden enriquecerse mutuamente.
            speakers:
              - the-jare
          - time: '14:30 - 16:30h'
            title: "\U0001F419 Comida y Pulpeirada"
            id: comida-viernes
            subtitle: ofrecido por SNGULAR
            description: >-
              Diferentes opciones gastronómicas ecológicas, sostenibles y mucho
              gallegas... incluyendo a Anxo —nuestro pulpeiro de O Carballiño—
              que distribuirá **300 raciones de pulpo *a feira* recien hecho**,
              y muchas mas cosas distribuidas por las mesas para que nadie tenga
              que esperar ninguna cola.


              Y, por supuesto, contaremos con opciones veganas y sin gluten.
            speakers: []
          - time: '16:30 - 16:45'
            title: ¿Qué saben los muggles?
            subtitle: Video
            description: >-
              Nuestros intrépidos reporteros se lanzarán a la calle, micrófono
              en mano, para averiguar hasta qué punto el público general -sin
              experiencia técnica- conoce el día a día del sector informático.
            speakers: []
          - time: '16:45 - 17:30h'
            title: Los billetes de avión se compran los martes
            id: charla-alberto
            subtitle: por Alberto Rey
            description: >-
              En esta charla descubrirás la algoritmia, infraestructura técnica
              y modelo de negocio detrás de la estrategía de precios dinámicos
              de las líneas aéreas, de la mano de alguien que las conoce
              perfectamente porque LAS HA CREADO.


              ¿Es verdad que si visitamos la web de una aerolínea más de una vez
              nos suben el precio de los billetes? ¿Es cierto que los martes los
              vuelos se pueden comprar más baratos? ¿Si reservo más tarde tengo
              la oportunidad de encontrar viajes más baratos? Después de asistir
              a esta ponencia, revisarás muchos de los mitos más extendidos
              sobre el precio de los vuelos.


              Nunca volverás a comprar un billete de avión como hacías hasta
              ahora.
            speakers:
              - alberto
          - time: '17:30 - 18:15 '
            title: La tecnología detrás de la lucha contra el fuego
            id: charla-macarena
            subtitle: por Macarena Ortega
            description: >-
              Este verano, España ha sufrido seis de los diez mayores incendios
              forestales del siglo XXI y tanto el incremento de temperaturas
              provocado por el cambio climático como el abandono del medio rural
              hacen a los expertos vaticinar que lo que viene puede ser mucho
              peor.


              En esta charla Macarena nos contará cómo una pequeña empresa
              española decidió no rendirse y encontrar una solución, combinando
              software, hardware y ciencia de datos hasta convertirse en un
              referente mundial en la lucha contra el fuego.
            speakers:
              - macarena
          - time: '18:15 - 19:00h'
            title: "\U0001F36A Merienda"
            id: merienda-viernes
            description: >-
              Café y bollería artesanal para aguantar hasta el final.


              En esta ocasión, Don Robot nos llevará hasta ese 1982 del primer
              «Tron» con una selección de música para recargar las pilas con la
              energía de los 80.
            speakers: []
          - time: '19:00 - 19:15'
            title: "\U0001F3B0 La Jerocleta"
            description: >-
              Sorteo de jugosos premios entre todos los que hayan tuiteado con
              el hashtag
              [#TRGx](https://x.com/search?q=%23trgx&src=typed_query&f=live){target="_blank"},
              realizado con la mítica «Jerocleta» de **Jerónimo López**. Sin
              duda alguna, el software español más utilizado de la historía.


              Cuanto más tuitees, más posibilidades tendrás de ganar.
            speakers: []
          - time: '19:15 - 20:00h'
            title: Open Source que salva vidas
            id: charla-pablo
            subtitle: por Pablo Sánchez
            description: >-
              Pablo nos contará cómo ha aplicado muchas de las metodologías que
              ha aprendido en su carrera como ingeniero de hardware a un
              proyecto social, lo que le ha permitido fabricar incubadoras con
              un coste de 350€ en vez de los 30.000€.


              No es magia, solo tecnología y buenas prácticas. Desde el enfoque
              open source, para que el proceso pueda ser auditable y escalable,
              hasta la priorización de funciones en los dispositivos para
              demostrar —una vez más— la Ley de Pareto «de libro» aplicado el
              desarrollo de tecnología: con el 20% del presupuesto total, se
              pueden desarrollar el 80% de las funcionalidades de un proyecto.


              En esta charla conocerás un caso práctico de la teoría que todos
              conocemos. Quien sabe, quizás sea la inspiración que necesites
              para aplicarlas en tu día a día.
            speakers:
              - pablo-sanchez
          - time: '20:00 - 20:30h'
            title: Rendición de cuentas
            id: rendicion-cuentas
            description: >-
              Como ya es tradición, **haremos públicas todas las cifras del
              evento** -fuentes de ingresos, partidas de gastos y cuenta de
              resultados-, agradeceremos el esfuerzo a todo el equipo de
              profesionales y voluntarios que lo hacen posible y vislumbraremos
              qué podemos esperar para el año que viene.
            speakers:
              - david-bonilla
          - time: '20:30 - 22:30h'
            title: "\U0001F973 Legendaria Fiesta Taruga"
            id: fiesta
            subtitle: ofrecida por Slimbook
            description: >-
              Transformaremos La Nave en una auténtica «discoteque» con comida y
              bebida, **suministro ilimitado de churros con y sin chocolate**,
              música y las mejores conversaciones del planeta porque... LA VIDA
              PUEDE SER MARAVILLOSA.


              * **INTRO** - Este año contaremos con la actuación de **Fake
              Punk**, una pareja de DJs que rendirá homenaje a Daft Punk con un
              set lleno de energía y buena música.

              * **MAIN EVENT** - Una estrella de la música, uno de esos artistas
              que todos conocemos, nos ayudará a poner el broche final al día.
              Stay tuned Antunez!
            speakers: []
