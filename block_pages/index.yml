extra_head: |-
  <style>
    @scope(.block-hero) {
      :scope {      
        padding-top: 120px;
        overflow: hidden;
        position: relative;
        background: none;
      }

      h1 {
        display: none;
      }
      .logo {
        display: grid;
        justify-content: center;
        justify-items: center;
        width: fit-content;
        margin: auto;
        padding: 20px 10px;
        position: relative;
        z-index: 2;
        animation: logoin 1s both;
      }
      .logo img {
        width: 100%;
        max-width: 600px;
        height: auto;
        display: block;
        content: "";
      }
      time {
        font-family: condensed;
        text-transform: uppercase;
        font-size: clamp(2rem, 1vw, 2.5rem);
        letter-spacing: 0.1em;
        text-shadow: -2px 2px 0 black;
      }
      .video-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        mask-image: linear-gradient(#000 75%, #0000);
      }
      .forma-2,
      .forma-1 {
        width: clamp(100px, 10vw, 150px);
        height: auto;
        position: absolute;
        z-index: 1;
      }
      .forma-2 {
        top: 15%;
        left: calc(50% + min(300px, 25vw));
      }
      .forma-1 {
        bottom: 0;
        left: calc(50% - min(400px, 45vw));
      }
    }
    .ly-blocks {
      background-image: linear-gradient(
        to bottom,
        oklch(0.10 0.05 345) 15%,
        oklch(0.60 0.16 345) 40%,
        #dafaff 50%,
        #dafaff 90%,
        oklch(0.65 0.16 234) 95%
      );
    }
    @keyframes logoin {
      from {
        transform: scale(1.5);
        opacity: .3;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }
    
    #partners .block-logos-list img {
      filter: none
    }
  </style>
