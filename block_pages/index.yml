    text: >-
      La TRG es **una conferencia sobre diseño, desarrollo y comercialización de
      servicios digitales** que nace con el objetivo de punto de encuentro para
      «gente que hace cosas» alrededor del software, la innovación tecnológica e
      Internet: técnicos, diseñadores, gente de negocio, marketing u
      operaciones. Aquí nadie sobra. Todos son bienvenidos.


      Se organiza cuidando cada detalle de forma enfermiza —desde las
      acreditaciones hasta la oferta gastronómica— para intentar transformar la
      asistencia en una experiencia y aportar el mayor valor posible a
      asistentes, ponentes y patrocinadores.


      En esta edición, todo el contenido pivotará alrededor de la Inteligencia
      Artificial, desde un punto de vista pragmático y absolutamente práctico.


      Todos nos preguntamos cómo afectará la IA a nuestro trabajo. La agenda de
      la TRG se ha diseñado para que encontremos respuestas.
