blocks:
  - type: hero
    title: TRGCON 26
    intro: |-
      <div class="logo">
      <time>Madrid. 22–24 octubre</time>
      <img src="/files/trgcon-veintiseis.png" alt="TRGCON Veintiseis">
      </div>
  - type: text
    id: intro
    theme: width-full
    columns: false
    text: >-
      La IA ha supuesto una revolución para la sociedad en general y el sector
      tecnológico en particular. En 2026, la TRG quiere ser el lugar donde
      separar la señal del ruido y aprender lo que realmente debemos hacer para
      seguir construyendo el futuro.
