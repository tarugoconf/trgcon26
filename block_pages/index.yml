              actualizamos con [X](https://x.com/tarugoconf){target=_blank} e
              [Instagram](https://www.instagram.com/tarugoconf/).
            speakers:
              - sonny
          - time: '14:30 - 16:30h'
            title: "\U0001F419 Comida y Pulpeirada"
            id: comida-viernes
            description: >-
              Diferentes opciones gastronómicas ecológicas, sostenibles y mucho
