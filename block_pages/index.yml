    id: partners
    theme: width-full
    description: >-
      Estas son las compañías que hacen que todo esto sea posible. Cada una de
      estas empresas ha decidido apoyarnos para que la TRG pueda contar con una
      mínima seguridad económica y así podamos centrarnos en ofrecer a la
      Comunidad la calidad y el espíritu de siempre. Si quieres ser parte de
      este esfuerzo, en esta o en la edición de 2024, [consulta nuestras
      *awesómicas* oportunidades de
      patrocinio](https://www.dropbox.com/scl/fi/06f7fbh2eqep3bab0vnxh/TRG24_sponsorship_deck_ES.pdf?rlkey=cz12k1c7wyxins6jv71qfjeyk&dl=0){target=_blank}
      ¡graciñas!



      [![Image](files/logos/wordpresscom_white.png){width=600}](https://wordpress.com/es/ppc/creador-de-paginas-web-wordpress/?utm_medium=referral&utm_source=TRG2025&utm_campaign=eventhomepage){target=_blank}


      Crea, publica, y despega.
