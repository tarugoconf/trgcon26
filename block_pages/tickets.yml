blocks:
  - type: header
    title: Entradas
    description: >
      La TRG se celebrará **del 22 al 24 de octubre de 2026 en La Nave
      (Madrid)**.<br><br>Las entradas se pondrán a la venta **el 5 de julio a
      las 11:00h GMT** (Galician Mean Time). Los suscriptores de [La
      Bonilista](https://www.bonilista.com/){target=_blank} podrán acceder a las
      entradas *early bird* desde ese mismo momento y, un día después, —si
      quedán disponibles— también el público general.</br>¡Corre si no te
      quieres quedar sin la tuya!


      > [!note]

      >

      > Si trabajas **para una empresa** y quieres comprar varias entradas para
      tus compañeros sin tener que ir UNA A UNA y con una factura o presupuesto
      previo, escríbenos a
      [tarugoconf@bonillaware.com](mailto:tarugoconf@bonillaware.com).
  - type: tickets
    id: tickets
    theme: is-primary width-full box-fill
    features:
      - id: conferences
        text: Acceso presencial a las conferencias (3 días)
      - id: food
        text: Comida y bebida ilimitada durante la jornada principal (viernes)
      - id: workshop
        text: Posibilidad de reservar plaza en los talleres prácticos (jueves)
      - id: networking
        text: Acceso a las actividades de networking (jueves)
      - id: community_day
        text: Acceso al Community Day (sábado)
      - id: tshirt
        text: Camiseta del evento
      - id: welcome_pack
        text: Welcome Pack
      - id: party
        text: Entrada a la fiesta (viernes)
      - id: dinner
        text: 'Entrada a la cena de mecenas, patrocinadores y ponentes (jueves)'
      - id: goodie
        text: Goodie exclusivo para mecenas
      - id: senate
        text: Acceso al «Senado»
      - id: photo
        text: Foto en la web del evento (si lo desean)
    tickets:
      - name: Early Bird
        pricing: 165€ + IVA
        img: /files/ENTRADA EARLY BIRD.png
