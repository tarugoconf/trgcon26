extra_head: |-
  <style>
    .type-header {
      font-size: min(4rem, 10vw);
      font-weight: normal;
      font-family: condensed;
      color: var(--color-dark);
      text-shadow: -4px 4px 0 color-mix(in srgb, var(--color-light) 50%, transparent);
    }
    .markdown-alert {
      background-color: var(--color-light);
      margin-top: 2rem;
      color: var(--color-dark);
      box-shadow: -4px 4px 0 var(--color-secondary);
      border-radius: 0;
      transform: rotate(-3deg);
      a {
        color: inherit;
      }
    }
    #tickets {
      --color-icons: var(--color-dark);
      --color-shadow: color-mix(in srgb, var(--color-primary) 90%, black);
    }
    .tickets-table .ticket-feature-value {
      background: #007eb6;
    }
    .tickets-table .ticket-feature-title {
      background: none;
    }
    .tickets-table td {
      border-left: solid 1px var(--color-primary);
    }
    .ticket-feature-value.is-included svg {
      fill: #a2e9aa;
    }
    .tickets-list > li {
      background: #007eb6;
    }
    .ticket-header {
      background-color: var(--color-primary);
    }
  </style>
