blocks:
  - type: header
    title: Entradas
    description: >
      TODAS las entradas saldrán a la venta **el 5 de julio de 2026 a las 11:00h
      (CEST)**.</br></br>Ese día, las entradas *early bird* estarán disponibles
      sólo mediante un código de acceso que se enviará a los suscriptores de [La
      Bonilista](https://www.bonilista.com/){target=_blank} a esa misma hora. Un
      día después, si aún quedan disponibles, se pondrán a disposición del
      público general.</br></br>Tienes más info e instrucciones detalladas en
      [este
      post](https://www.trgcon.com/blog/como-comprar-entradas-trg26/){target=_blank}.</br>¡Corre
      si no te quieres quedar sin las tuyas!


      > [!note]

      >

      > Si trabajas **para una empresa** y quieres comprar varias entradas para
      tus compañeros sin tener que ir UNA A UNA y con una factura o presupuesto
      previo, escríbenos a
      [tarugoconf@bonillaware.com](mailto:tarugoconf@bonillaware.com).
  - type: tickets
    id: tickets
    theme: is-primary width-full box-fill
    features:
      - id: conferences
        text: Acceso presencial a las conferencias (3 días)
      - id: food
        text: Comida y bebida ilimitada durante la jornada principal (viernes)
      - id: workshop
        text: Posibilidad de reservar plaza en los talleres prácticos (jueves)
      - id: networking
        text: Acceso a las actividades de networking (jueves)
      - id: community_day
        text: Acceso al Community Day (sábado)
      - id: tshirt
        text: Camiseta del evento
      - id: welcome_pack
        text: Welcome Pack
      - id: party
        text: Entrada a la fiesta (viernes)
      - id: dinner
        text: 'Entrada a la cena de mecenas, patrocinadores y ponentes (jueves)'
      - id: goodie
        text: Goodie exclusivo para mecenas
      - id: senate
        text: Acceso al «Senado»
      - id: photo
        text: Foto en la web del evento (si lo desean)
    tickets:
